name: Deploying an app

on:
  push:
    branches:
      - main

jobs:
  deploy_on_ec2:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          set -x
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{secrets.KNOWN_HOSTS}} >> ~/.ssh/known_hosts
          ssh -i ~/.ssh/id_rsa ${{secrets.EC2_USER}}@${{secrets.KNOWN_HOSTS}} "
           cd ~/draw &&
           git pull origin main && 
           pnpm install &&
           pm2 restart monorepo-dev
          "

           


